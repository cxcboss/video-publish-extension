<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 视频发布助手</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container" id="app-container">

    <!-- 顶部状态栏 + 发布按钮 -->
    <div class="topbar">
      <div class="topbar-left">
        <span class="status-dot" id="status-dot"></span>
        <span class="status-text" id="status-text">检测中...</span>
      </div>
      <button id="publish-btn" class="publish-btn">发布</button>
      <span class="version" id="version-text">v2.7.3</span>
    </div>

    <!-- 发布中状态 -->
    <div id="publish-animation" class="publish-animation hidden">
      <div class="anim-timer-box">
        <div class="anim-timer-label" id="anim-label">发布中...</div>
        <div class="anim-timer" id="anim-timer"></div>
        <div class="anim-timer-detail" id="anim-detail"></div>
      </div>
    </div>

    <!-- 发布进度 -->
    <div id="progress-section" class="section compact hidden">
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="progress-step" id="progress-step">准备中...</div>
      <div class="progress-detail" id="progress-detail"></div>
    </div>

    <!-- 平台选择 -->
    <div class="section compact section-controls">
      <div class="platform-row">
        <div class="platform-group">
          <button id="douyin-btn" class="platform-btn"><span>♪</span> 抖音</button>
          <button class="open-link-btn" id="open-douyin" title="打开抖音创作者中心">↗</button>
        </div>
        <div class="platform-group">
          <button id="weixin-btn" class="platform-btn"><span>◈</span> 视频号</button>
          <button class="open-link-btn" id="open-weixin" title="打开视频号创作平台">↗</button>
        </div>
      </div>
    </div>

    <!-- 定时发布 -->
    <div class="section compact section-controls">
      <div class="row-between">
        <label class="toggle-label">
          <input type="checkbox" id="scheduled-publish">
          <span class="toggle-switch"></span>
          <span>定时发布</span>
        </label>
        <div id="schedule-time-wrap" class="inline-input hidden">
          <input type="datetime-local" id="schedule-time">
        </div>
      </div>
      <div class="hint" id="schedule-hint">抖音：调用平台原生定时发布</div>
    </div>

    <!-- 自动重试 -->
    <div class="section compact section-controls">
      <div class="row-between">
        <label class="toggle-label">
          <input type="checkbox" id="auto-retry" checked>
          <span class="toggle-switch"></span>
          <span>超时自动重试</span>
        </label>
      </div>
      <div id="retry-options" class="hidden" style="margin-top:6px">
        <div class="row-between">
          <span class="hint" style="flex:1">单个视频超时时自动重试</span>
          <div class="inline-input">
            <label class="small-label">超时</label>
            <input type="number" id="timeout-seconds" min="30" max="600" value="120" class="small-input" style="width:52px">
            <label class="small-label">秒</label>
          </div>
          <div class="inline-input" style="margin-left:8px">
            <label class="small-label">次数</label>
            <input type="number" id="max-retries" min="1" max="10" value="1" class="small-input">
          </div>
        </div>
      </div>
    </div>

    <!-- AI 生成 -->
    <div class="section compact section-controls">
      <div class="row-between clickable" id="auto-generate-row">
        <label class="toggle-label" onclick="event.stopPropagation()">
          <input type="checkbox" id="auto-generate">
          <span class="toggle-switch"></span>
          <span>AI 生成文案和标签</span>
        </label>
        <span class="arrow" id="ai-arrow" title="AI 配置">▸</span>
      </div>
      <div id="ai-config-wrap" class="hidden">
        <div class="form-row" style="margin-top:8px">
          <label>Provider</label>
          <select id="ai-provider">
            <option value="">-- 选择 --</option>
            <option value="mimo">小米 MiMo (mimo-v2.5)</option>
            <option value="openai">OpenAI GPT</option>
            <option value="gemini">Google Gemini</option>
            <option value="doubao">豆包 (字节)</option>
            <option value="deepseek">DeepSeek</option>
          </select>
        </div>
        <div class="form-row"><label>API Key</label><input type="password" id="ai-key" placeholder="sk-..."></div>
        <div class="form-row"><label>Model</label><input type="text" id="ai-model" placeholder="可选，留空用默认"></div>
        <button id="test-ai-btn" class="test-btn">测试连接</button>
        <div id="test-result" class="test-result hidden"></div>
      </div>
      <div id="video-content-wrap" class="hidden">
        <textarea id="video-content" placeholder="描述视频内容，AI 根据此内容生成话题标签（最多5个）和描述文案"></textarea>
      </div>
    </div>

    <!-- 视频目录 -->
    <div class="section compact section-controls">
      <div class="path-row">
        <input type="text" id="video-path" placeholder="视频目录路径 /Users/xxx/Videos">
        <button id="refresh-btn" class="path-btn refresh" title="刷新列表">↻</button>
        <button id="browse-btn" class="path-btn">浏览</button>
      </div>
      <div id="video-list" class="video-list"></div>
    </div>

    <!-- 发布队列 -->
    <div class="section compact" id="queue-section">
      <div class="section-header">
        <span>发布队列</span>
        <span class="queue-count" id="queue-count">0</span>
      </div>
      <div id="publish-queue" class="publish-queue"></div>
    </div>

    <!-- 服务启动提示 -->
    <div id="server-hint" class="server-hint hidden">
      <div class="server-hint-title">本地服务未启动</div>
      <code id="server-cmd">cd local-server && node server.js</code>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src http://127.0.0.1:* https://api.github.com">
  <title>AI 视频发布助手</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>AI 视频发布助手</h1>
      <span class="version" id="version">v2.3.2</span>
    </header>

    <!-- 服务状态 -->
    <section class="card">
      <div class="card-header">
        <span>本地服务</span>
        <button id="refresh-btn" class="icon-btn" title="刷新状态">↻</button>
      </div>
      <div class="service-status">
        <span class="dot" id="service-dot"></span>
        <span id="service-text">检测中...</span>
      </div>
      <div class="service-actions">
        <button id="start-btn" class="btn">启动服务</button>
        <button id="stop-btn" class="btn btn-outline">停止</button>
      </div>
      <div class="hint">端口: 3000 | 用于插件读取本地视频文件</div>
    </section>

    <!-- 环境安装 -->
    <section class="card">
      <div class="card-header">
        <span>环境配置</span>
      </div>
      <div class="install-actions">
        <button id="install-deps-btn" class="btn">一键安装环境</button>
        <button id="install-ext-btn" class="btn btn-primary">安装浏览器插件</button>
      </div>
      <div id="install-log" class="install-log hidden"></div>
      <div id="install-guide" class="install-guide hidden">
        <div class="guide-title">插件安装教程</div>
        <ol class="guide-steps">
          <li>打开 Chrome 浏览器，地址栏输入 <code>chrome://extensions</code></li>
          <li>右上角打开「开发者模式」开关</li>
          <li>点击「加载已解压的扩展程序」按钮</li>
          <li>选择文件夹：<code id="ext-install-path"></code></li>
          <li>插件安装完成，点击工具栏图标使用</li>
        </ol>
        <button id="open-ext-dir-btn" class="btn btn-outline">打开插件目录</button>
        <button id="open-ext-page-btn" class="btn btn-outline">打开扩展管理页</button>
      </div>
    </section>

    <!-- 更新检测 -->
    <section class="card">
      <div class="card-header">
        <span>插件更新</span>
        <button id="check-update-btn" class="icon-btn" title="检测更新">↻</button>
      </div>
      <div id="update-status" class="update-status">点击检测按钮检查更新</div>
      <div id="update-info" class="hidden">
        <div class="update-version" id="update-version"></div>
        <div class="update-changelog" id="update-changelog"></div>
        <button id="update-btn" class="btn btn-primary">更新插件</button>
      </div>
      <div class="hint">从 GitHub 下载最新版本并覆盖本地插件文件</div>
    </section>

    <footer>
      <span>插件目录: <code id="ext-path"></code></span>
    </footer>
  </div>

  <script>
    async function init() {
      const version = await window.api.getVersion();
      document.getElementById('version').textContent = `v${version}`;

      // 显示插件安装路径
      const extPath = await window.api.getExtPath();
      document.getElementById('ext-install-path').textContent = extPath;

      window.api.onServerStatus((status) => {
        const dot = document.getElementById('service-dot');
        const text = document.getElementById('service-text');
        if (status.running) {
          dot.className = 'dot on';
          text.textContent = status.note || '服务运行中';
        } else {
          dot.className = 'dot off';
          text.textContent = status.error || '服务未运行';
        }
      });

      document.getElementById('refresh-btn').onclick = () => window.api.serverAction('check');
      document.getElementById('start-btn').onclick = () => window.api.serverAction('start');
      document.getElementById('stop-btn').onclick = () => window.api.serverAction('stop');

      // 一键安装环境
      document.getElementById('install-deps-btn').onclick = async () => {
        const btn = document.getElementById('install-deps-btn');
        const log = document.getElementById('install-log');
        btn.disabled = true;
        btn.textContent = '安装中...';
        log.classList.remove('hidden');
        log.textContent = '正在安装服务依赖 (npm install)...';
        const r = await window.api.installServerDeps();
        btn.disabled = false;
        if (r.success) {
          log.textContent = '✓ 服务依赖安装完成';
          log.className = 'install-log success';
        } else {
          log.textContent = '✗ 安装失败: ' + r.error;
          log.className = 'install-log error';
        }
      };

      // 安装浏览器插件
      document.getElementById('install-ext-btn').onclick = async () => {
        const btn = document.getElementById('install-ext-btn');
        const log = document.getElementById('install-log');
        btn.disabled = true;
        btn.textContent = '安装中...';
        log.classList.remove('hidden');
        log.textContent = '正在复制插件文件...';
        const r = await window.api.installExtension();
        btn.disabled = false;
        if (r.success) {
          log.textContent = '✓ 插件已安装到: ' + r.path;
          log.className = 'install-log success';
          document.getElementById('install-guide').classList.remove('hidden');
        } else {
          log.textContent = '✗ 安装失败: ' + r.error;
          log.className = 'install-log error';
        }
      };

      document.getElementById('open-ext-dir-btn').onclick = () => window.api.openExtDir();
      document.getElementById('open-ext-page-btn').onclick = () => window.api.openExtensions();

      // 更新检测
      document.getElementById('check-update-btn').onclick = async () => {
        document.getElementById('update-status').textContent = '检测中...';
        document.getElementById('check-update-btn').disabled = true;
        const result = await window.api.checkUpdate();
        document.getElementById('check-update-btn').disabled = false;

        if (result.error) {
          document.getElementById('update-status').textContent = '检测失败: ' + result.error;
          return;
        }
        if (!result.hasUpdate) {
          document.getElementById('update-status').textContent = '已是最新版本';
          document.getElementById('update-info').classList.add('hidden');
          return;
        }

        document.getElementById('update-status').textContent = '发现新版本';
        document.getElementById('update-version').textContent = `${result.currentVersion} → ${result.latestVersion}`;
        document.getElementById('update-changelog').textContent = result.changelog;
        document.getElementById('update-info').classList.remove('hidden');

        document.getElementById('update-btn').onclick = async () => {
          document.getElementById('update-btn').disabled = true;
          document.getElementById('update-btn').textContent = '下载中...';
          const dl = await window.api.doUpdate(result.zipUrl);
          document.getElementById('update-btn').disabled = false;
          document.getElementById('update-btn').textContent = dl.success ? '更新完成' : '更新失败';
        };
      };
    }

    init();
  </script>
</body>
</html>

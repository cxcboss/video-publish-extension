<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src http://127.0.0.1:* https://api.github.com">
  <title>AI 视频发布助手</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>AI 视频发布助手</h1>
    </header>

    <!-- 服务状态 -->
    <section class="card">
      <div class="card-header">
        <span>本地服务</span>
        <button id="refresh-btn" class="icon-btn" title="刷新状态">↻</button>
      </div>
      <div class="service-status">
        <span class="dot" id="service-dot"></span>
        <span id="service-text">检测中...</span>
      </div>
      <div class="service-actions">
        <button id="start-btn" class="btn">启动服务</button>
        <button id="stop-btn" class="btn btn-outline">停止</button>
      </div>
    </section>

    <!-- 环境安装 -->
    <section class="card">
      <div class="card-header"><span>环境配置</span></div>
      <div id="env-status" class="env-status">检测中...</div>
      <div class="install-actions">
        <button id="install-deps-btn" class="btn">安装环境</button>
      </div>
      <div id="install-log" class="install-log hidden"></div>
    </section>

    <!-- 浏览器插件 -->
    <section class="card">
      <div class="card-header"><span>浏览器插件</span></div>
      <div id="ext-status" class="env-status">检测中...</div>
      <div class="install-actions">
        <button id="install-ext-btn" class="btn btn-primary">安装插件</button>
      </div>
      <div id="ext-install-log" class="install-log hidden"></div>
      <div id="install-guide">
        <div class="guide-title">Chrome 安装教程</div>
        <ol class="guide-steps">
          <li>打开 Chrome，地址栏输入 <code>chrome://extensions</code></li>
          <li>右上角打开「开发者模式」开关</li>
          <li>点击「加载已解压的扩展程序」</li>
          <li>选择文件夹：<code id="ext-install-path">...</code></li>
        </ol>
        <button id="open-ext-dir-btn" class="btn btn-outline">打开插件目录</button>
      </div>
    </section>

    <!-- 更新检测 -->
    <section class="card">
      <div class="card-header">
        <span>插件更新</span>
        <button id="check-update-btn" class="icon-btn" title="检测更新">↻</button>
      </div>
      <div id="update-status" class="update-status">点击 ↻ 检测更新</div>
      <div id="update-info" class="hidden">
        <div class="update-version" id="update-version"></div>
        <div class="update-changelog" id="update-changelog"></div>
        <button id="update-do-btn" class="btn btn-primary">更新插件</button>
      </div>
    </section>

    <footer>本地服务端口: 3000</footer>
  </div>

  <script>
    async function init() {
      // 检测环境
      const env = await window.api.checkEnv();
      const depsBtn = document.getElementById('install-deps-btn');
      const depsLog = document.getElementById('install-log');
      if (env.depsInstalled) {
        document.getElementById('env-status').innerHTML = '✓ 服务依赖已安装';
        document.getElementById('env-status').className = 'env-status ok';
        depsBtn.textContent = '重新安装';
      } else {
        document.getElementById('env-status').innerHTML = '✗ 服务依赖未安装';
        document.getElementById('env-status').className = 'env-status err';
      }

      // 插件状态
      const extPath = await window.api.getExtPath();
      document.getElementById('ext-install-path').textContent = extPath;
      if (env.extInstalled) {
        document.getElementById('ext-status').innerHTML = '✓ 插件已安装 (v' + env.extVersion + ')';
        document.getElementById('ext-status').className = 'env-status ok';
        document.getElementById('install-ext-btn').textContent = '重新安装';
      } else {
        document.getElementById('ext-status').innerHTML = '✗ 插件未安装';
        document.getElementById('ext-status').className = 'env-status err';
      }

      // 服务状态监听
      window.api.onServerStatus((s) => {
        const dot = document.getElementById('service-dot');
        const text = document.getElementById('service-text');
        dot.className = 'dot ' + (s.running ? 'on' : 'off');
        text.textContent = s.running ? (s.note || '服务运行中') : (s.error || '服务未运行');
      });

      // 按钮绑定
      document.getElementById('refresh-btn').onclick = () => window.api.serverAction('check');
      document.getElementById('start-btn').onclick = () => window.api.serverAction('start');
      document.getElementById('stop-btn').onclick = () => window.api.serverAction('stop');
      document.getElementById('open-ext-dir-btn').onclick = () => window.api.openExtDir();

      // 安装环境
      depsBtn.onclick = async () => {
        depsBtn.disabled = true; depsBtn.textContent = '安装中...';
        depsLog.classList.remove('hidden'); depsLog.textContent = '正在安装 npm 依赖...';
        const r = await window.api.installServerDeps();
        depsBtn.disabled = false;
        if (r.success) {
          depsLog.textContent = '✓ 安装完成'; depsLog.className = 'install-log success';
          document.getElementById('env-status').innerHTML = '✓ 服务依赖已安装';
          document.getElementById('env-status').className = 'env-status ok';
          depsBtn.textContent = '重新安装';
        } else {
          depsLog.textContent = '✗ 失败: ' + r.error; depsLog.className = 'install-log error';
        }
      };

      // 安装插件
      document.getElementById('install-ext-btn').onclick = async () => {
        const btn = document.getElementById('install-ext-btn');
        const log = document.getElementById('ext-install-log');
        btn.disabled = true; btn.textContent = '安装中...';
        log.classList.remove('hidden'); log.textContent = '正在复制插件文件...';
        const r = await window.api.installExtension();
        btn.disabled = false;
        if (r.success) {
          log.textContent = '✓ 插件已安装'; log.className = 'install-log success';
          const newEnv = await window.api.checkEnv();
          if (newEnv.extVersion) {
            document.getElementById('ext-status').innerHTML = '✓ 插件已安装 (v' + newEnv.extVersion + ')';
            document.getElementById('ext-status').className = 'env-status ok';
          }
          btn.textContent = '重新安装';
        } else {
          log.textContent = '✗ 失败: ' + r.error; log.className = 'install-log error';
        }
      };

      // 更新检测
      document.getElementById('check-update-btn').onclick = async () => {
        const status = document.getElementById('update-status');
        const btn = document.getElementById('check-update-btn');
        status.textContent = '检测中...'; btn.disabled = true;
        const result = await window.api.checkUpdate();
        btn.disabled = false;
        if (result.error) { status.textContent = '检测失败: ' + result.error; return; }
        if (!result.hasUpdate) {
          const v = result.installedVersion ? '当前 v' + result.installedVersion : '未安装插件';
          status.textContent = v + ' — 已是最新'; return;
        }
        status.textContent = '发现新版本';
        document.getElementById('update-version').textContent =
          'v' + (result.installedVersion || '?') + ' → v' + result.latestVersion;
        document.getElementById('update-changelog').textContent = result.changelog;
        document.getElementById('update-info').classList.remove('hidden');
        document.getElementById('update-do-btn').onclick = async () => {
          const ubtn = document.getElementById('update-do-btn');
          ubtn.disabled = true; ubtn.textContent = '下载中...';
          const dl = await window.api.doUpdate(result.zipUrl);
          ubtn.disabled = false;
          ubtn.textContent = dl.success ? '✓ 更新完成' : '✗ 更新失败';
          if (dl.success) {
            const newEnv = await window.api.checkEnv();
            if (newEnv.extVersion) {
              document.getElementById('ext-status').innerHTML = '✓ 插件已安装 (v' + newEnv.extVersion + ')';
              document.getElementById('ext-status').className = 'env-status ok';
            }
          }
        };
      };
    }
    init();
  </script>
</body>
</html>
